name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: macos-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build ra CLI
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$BUILD_TARGET" -p ra-cli

      - name: Build ra-mcp-server
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$BUILD_TARGET" -p ra-mcp

      - name: Package binaries
        env:
          BUILD_TARGET: ${{ matrix.target }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          mkdir -p dist
          cp "target/${BUILD_TARGET}/release/ra" "dist/ra-${SUFFIX}"
          cp "target/${BUILD_TARGET}/release/ra-mcp-server" "dist/ra-mcp-server-${SUFFIX}"
          chmod +x dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
